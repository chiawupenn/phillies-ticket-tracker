<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phillies 2026 Season Tickets — Available Games</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  :root {
    --phillies-red: #E81828;
    --phillies-blue: #002D72;
    --available-green: #16a34a;
    --sold-gray: #9ca3af;
    --bg: #f8fafc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: #1e293b;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, var(--phillies-blue) 0%, #001a45 100%);
    color: white;
    padding: 28px 24px 22px;
    text-align: center;
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 4px;
    background: var(--phillies-red);
  }
  .header h1 {
    font-size: 1.75rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .header h1 span { color: var(--phillies-red); }
  .header p {
    margin-top: 6px;
    font-size: 0.9rem;
    opacity: 0.8;
  }
  .last-updated {
    margin-top: 8px;
    font-size: 0.75rem;
    opacity: 0.55;
  }

  .legend {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 14px 16px;
    background: white;
    border-bottom: 1px solid #e2e8f0;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.82rem;
    font-weight: 500;
  }
  .legend-dot {
    width: 14px; height: 14px;
    border-radius: 4px;
  }
  .legend-dot.available { background: var(--available-green); }
  .legend-dot.sold { background: var(--sold-gray); }
  .legend-dot.no-game { background: #f1f5f9; border: 1px solid #e2e8f0; }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 900px;
    margin: 0 auto;
    padding: 16px;
    gap: 16px;
  }

  .stats-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    flex: 1;
  }
  .stat-card {
    background: white;
    border-radius: 10px;
    padding: 12px 20px;
    text-align: center;
    border: 1px solid #e2e8f0;
    min-width: 110px;
  }
  .stat-num {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--phillies-blue);
  }
  .stat-num.green { color: var(--available-green); }
  .stat-label {
    font-size: 0.72rem;
    color: #64748b;
    font-weight: 600;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .cart-btn {
    background: var(--phillies-red);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px 16px;
    font-weight: 700;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all .15s;
    white-space: nowrap;
  }
  .cart-btn:hover { background: #c81420; }
  .cart-count {
    background: white;
    color: var(--phillies-red);
    border-radius: 50%;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 0.85rem;
  }

  .month-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 20px 16px 8px;
  }
  .month-nav button {
    background: white;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    width: 40px; height: 40px;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .15s;
    color: var(--phillies-blue);
  }
  .month-nav button:hover { background: #F0F4FF; border-color: var(--phillies-blue); }
  .month-nav button:disabled { opacity: .3; cursor: default; }
  .month-nav h2 {
    font-size: 1.35rem;
    font-weight: 700;
    width: 220px;
    text-align: center;
    color: var(--phillies-blue);
  }

  .calendar-container {
    max-width: 900px;
    margin: 10px auto 30px;
    padding: 0 16px;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .cal-header {
    text-align: center;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    color: #64748b;
    padding: 8px 0;
  }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    position: relative;
    transition: transform .15s, box-shadow .15s;
    min-height: 80px;
  }
  .cal-day.empty { background: transparent; }
  .cal-day.no-game {
    background: #f8fafc;
    border: 1px solid #f1f5f9;
  }
  .cal-day.available {
    background: linear-gradient(145deg, #dcfce7, #bbf7d0);
    border: 2px solid var(--available-green);
    cursor: pointer;
  }
  .cal-day.available:hover {
    transform: scale(1.06);
    box-shadow: 0 6px 20px rgba(22,163,74,.25);
    z-index: 2;
  }
  .cal-day.sold {
    background: #f1f5f9;
    border: 1px solid #e2e8f0;
    opacity: .55;
  }
  .day-num {
    font-weight: 700;
    font-size: 1rem;
    color: #1e293b;
  }
  .cal-day.available .day-num { color: #15803d; }
  .opponent {
    font-size: 0.75rem;
    font-weight: 700;
    margin-top: 3px;
    text-align: center;
    line-height: 1.2;
    max-width: 95%;
  }
  .cal-day.available .opponent { font-weight: 700; }
  .cal-day.sold .opponent { opacity: 0.7; }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #64748b;
    font-size: 1rem;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 4px solid #e2e8f0;
    border-top-color: var(--phillies-red);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    text-align: center;
    padding: 40px;
    color: var(--phillies-red);
    font-weight: 600;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: white;
    border-radius: 16px;
    padding: 0;
    max-width: 450px;
    width: 90%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.2);
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .modal-header {
    background: #E8F4FF;
    padding: 16px 20px;
    position: sticky;
    top: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    z-index: 10;
  }

  .modal-close {
    background: none;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    color: #1e293b;
    padding: 0;
    flex-shrink: 0;
  }

  .modal-title-section {
    flex: 1;
  }

  .modal h3 {
    font-size: 1.1rem;
    font-weight: 700;
    margin: 0;
    color: #1e293b;
  }
  .modal h3 span.phillies {
    color: var(--phillies-red);
    font-size: 1.1rem;
  }
  .modal h3 span.opponent {
    font-weight: 700;
    font-size: 1.1rem;
  }

  .modal-content {
    padding: 16px 20px;
    overflow-y: auto;
    flex: 1;
  }
  .modal-row {
    display: flex;
    flex-direction: column;
    padding: 10px 0;
    border-bottom: 1px solid #f1f5f9;
    font-size: 0.85rem;
  }
  .modal-row:last-child { border: none; }
  .modal-label { color: #64748b; font-weight: 600; margin-bottom: 2px; text-transform: uppercase; font-size: 0.65rem; }
  .modal-value { font-weight: 600; color: #1e293b; font-size: 0.95rem; }
  .modal-value a {
    color: var(--phillies-blue);
    text-decoration: none;
    font-weight: 700;
  }
  .modal-value a:hover { text-decoration: underline; }

  .video-container {
    margin: 16px 0;
    border-radius: 10px;
    overflow: hidden;
    background: #f1f5f9;
  }
  .video-container iframe {
    border-radius: 10px;
  }

  .modal-button-sticky {
    background: var(--phillies-red);
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .modal-button-sticky:hover { background: #c81420; }

  .modal-buttons {
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    background: #f8fafc;
    border-top: 1px solid #e2e8f0;
    flex-shrink: 0;
  }
  .modal-btn {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .15s;
  }
  .btn-add-cart {
    background: var(--phillies-red);
    color: white;
  }
  .btn-add-cart:hover { background: #c81420; }
  .btn-close {
    background: #e2e8f0;
    color: #1e293b;
  }
  .btn-close:hover { background: #cbd5e1; }

  .footer {
    background: linear-gradient(to bottom, #ffffff, #f8fafc);
    border-top: 2px solid #e2e8f0;
    padding: 30px 16px;
    text-align: center;
    margin-top: 50px;
  }

  .powered-by {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .powered-by-text {
    font-size: 0.8rem;
    color: #94a3b8;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .smartq-link {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    transition: all .2s;
    padding: 8px 12px;
    border-radius: 8px;
  }

  .smartq-link:hover {
    background: rgba(0, 45, 114, 0.05);
  }

  .smartq-logo {
    height: 32px;
    width: 32px;
    object-fit: contain;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.05));
  }

  .smartq-brand {
    color: var(--phillies-blue);
    font-weight: 700;
    font-size: 0.9rem;
    transition: color .2s;
  }

  .smartq-link:hover .smartq-brand {
    color: var(--phillies-red);
  }

  @media (max-width: 600px) {
    .cal-day { min-height: 58px; }
    .day-num { font-size: 0.85rem; }
    .opponent { font-size: 0.55rem; }
    .month-nav h2 { font-size: 1.1rem; width: 180px; }
    .header h1 { font-size: 1.3rem; }
    .top-bar { flex-direction: column; }
    .modal { max-width: 95%; }
    .powered-by { gap: 8px; }
    .smartq-logo { height: 24px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>⚾ <span>Phillies</span> 2026 Season Tickets</h1>
  <p>Browse available games below — click any green date for details</p>
  <div class="last-updated" id="lastUpdated"></div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot available"></div> Available</div>
  <div class="legend-item"><div class="legend-dot sold"></div> Sold</div>
  <div class="legend-item"><div class="legend-dot no-game"></div> No Game</div>
</div>

<div class="top-bar">
  <button class="cart-btn" onclick="showCart()">
    🛒 Cart <span class="cart-count" id="cartCount">0</span>
  </button>
</div>

<div class="month-nav">
  <button id="prevBtn" onclick="changeMonth(-1)">◀</button>
  <h2 id="monthTitle"></h2>
  <button id="nextBtn" onclick="changeMonth(1)">▶</button>
</div>

<div class="calendar-container">
  <div class="cal-grid" id="calGrid"></div>
</div>

<div id="loading" class="loading">
  <div class="spinner"></div>
  Loading ticket data...
</div>


<!-- Game Modal (Restructured) -->
<div class="modal-overlay" id="modalOverlay2" style="display:none" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title-section">
        <h3 id="modalTitle2"></h3>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-content" id="modalBody2"></div>
    <div class="modal-buttons">
      <button class="modal-btn btn-add-cart" onclick="addToCart()">Add to Cart</button>
      <button class="modal-btn btn-close" onclick="closeModal()">Close</button>
    </div>
  </div>
</div>

<!-- Cart Modal -->
<div class="modal-overlay" id="cartOverlay" onclick="if(event.target===this) closeCart()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title-section">
        <h3>🛒 Shopping Cart</h3>
      </div>
      <button class="modal-close" onclick="closeCart()">✕</button>
    </div>
    <div class="modal-content" id="cartItems"></div>
    <div class="modal-buttons">
      <button class="modal-btn btn-add-cart" onclick="generatePurchaseOrder()">Generate Order</button>
      <button class="modal-btn btn-close" onclick="closeCart()">Continue</button>
    </div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzNAjm5BfPwXZbqQ31p0O2N45Vy71sj5UeV_JQu8cro9udH13oS7W4PsBeS-Lrfmg4B/exec';

let games = [];
let months = [];
let currentMonthIdx = 0;
let cart = [];
let selectedGame = null;

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAY_ABBR = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const TEAM_COLORS = {
  'Braves': '#CE1141', 'Marlins': '#00A3E0', 'Mets': '#002D72', 'Nationals': '#AB0003',
  'Yankees': '#0C2C56', 'Blue Jays': '#134687', 'Red Sox': '#BD3039', 'Rays': '#092C5F',
  'Orioles': '#003687', 'Rangers': '#003278', 'Astros': '#EB6E1F', 'Athletics': '#003831',
  'Angels': '#BA3B1D', 'Mariners': '#0C2C56', 'Twins': '#002B5C', 'Royals': '#12284B',
  'White Sox': '#27251F', 'Indians': '#00385D', 'Tigers': '#0C2C56', 'Guardians': '#00385D',
  'Cubs': '#0E3386', 'Cardinals': '#C41E3A', 'Reds': '#C6011F', 'Brewers': '#12284B',
  'Pirates': '#27251F', 'Giants': '#FD5000', 'Rockies': '#33006F', 'Dodgers': '#005A9C',
  'Padres': '#2F241D', 'Diamondbacks': '#A71930'
};

function getTeamColor(teamName) {
  return TEAM_COLORS[teamName] || '#1e293b';
}

async function fetchData() {
  const loadEl = document.getElementById('loading');
  loadEl.innerHTML = '<div class="spinner"></div>Loading ticket data...';
  loadEl.style.display = '';

  try {
    const r = await fetch(APPS_SCRIPT_URL);
    const data = await r.json();

    if (data.error || !Array.isArray(data)) {
      loadEl.innerHTML = `<div class="error-msg">Error loading data</div>`;
      return;
    }

    games = [];
    data.forEach(g => {
      const parsed = parseDate(g.date);
      if (!parsed) return;
      games.push({
        date: parsed,
        dateStr: formatDate(parsed),
        time: g.time || '',
        opponent: g.opponent || 'TBD',
        section: g.section || '',
        sold: g.sold === true || g.sold === 'TRUE'
      });
    });

    const monthSet = new Set();
    games.forEach(g => monthSet.add(g.date.getFullYear() + '-' + String(g.date.getMonth()).padStart(2,'0')));
    months = [...monthSet].sort();

    if (games.length === 0) {
      loadEl.innerHTML = '<div class="error-msg">No games found.</div>';
      return;
    }

    loadEl.style.display = 'none';
    document.getElementById('lastUpdated').textContent = 'Last refreshed: ' + new Date().toLocaleTimeString();
    renderCalendar();
  } catch(e) {
    loadEl.innerHTML = `<div class="error-msg">Error: ${e.message}</div>`;
  }
}

function parseDate(str) {
  if (!str) return null;
  const d = new Date(str);
  if (!isNaN(d.getTime()) && d.getFullYear() >= 2025) return d;
  const m = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (m) {
    const yr = m[3].length === 2 ? 2000 + parseInt(m[3]) : parseInt(m[3]);
    const d2 = new Date(yr, parseInt(m[1]) - 1, parseInt(m[2]));
    if (!isNaN(d2.getTime())) return d2;
  }
  return null;
}

function formatDate(d) {
  const mn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return mn[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();
}

function renderCalendar() {
  if (months.length === 0) return;
  const [year, mon] = months[currentMonthIdx].split('-').map(Number);
  document.getElementById('monthTitle').textContent = MONTH_NAMES[mon] + ' ' + year;
  document.getElementById('prevBtn').disabled = currentMonthIdx === 0;
  document.getElementById('nextBtn').disabled = currentMonthIdx === months.length - 1;

  const firstDay = new Date(year, mon, 1).getDay();
  const daysInMonth = new Date(year, mon + 1, 0).getDate();

  const gameMap = {};
  games.forEach(g => {
    if (g.date.getFullYear() === year && g.date.getMonth() === mon) {
      const d = g.date.getDate();
      if (!gameMap[d]) gameMap[d] = [];
      gameMap[d].push(g);
    }
  });

  let html = '';
  DAY_ABBR.forEach(d => html += `<div class="cal-header">${d}</div>`);

  for (let i = 0; i < firstDay; i++) html += '<div class="cal-day empty"></div>';

  for (let d = 1; d <= daysInMonth; d++) {
    const gamesOnDay = gameMap[d];
    if (gamesOnDay) {
      const anyAvail = gamesOnDay.some(g => !g.sold);
      const allSold = gamesOnDay.every(g => g.sold);
      const cls = allSold ? 'sold' : 'available';
      const g = gamesOnDay[0];
      const onclick = anyAvail ? `onclick="showModal(${year},${mon},${d})"` : '';
      const teamColor = getTeamColor(g.opponent);
      html += `<div class="cal-day ${cls}" ${onclick}>
        <div class="day-num">${d}</div>
        <div class="opponent" style="color:${teamColor}">${gamesOnDay.map(g => g.opponent).join(' / ')}</div>
        ${allSold ? '<small style="color:#94a3b8">SOLD</small>' : '<small style="color:#16a34a;font-weight:600">AVAIL</small>'}
      </div>`;
    } else {
      html += `<div class="cal-day no-game"><div class="day-num">${d}</div></div>`;
    }
  }

  document.getElementById('calGrid').innerHTML = html;
}

function changeMonth(dir) {
  currentMonthIdx = Math.max(0, Math.min(months.length - 1, currentMonthIdx + dir));
  renderCalendar();
}

function showModal(year, mon, day) {
  const gamesOnDay = games.filter(g => g.date.getFullYear() === year && g.date.getMonth() === mon && g.date.getDate() === day && !g.sold);
  if (!gamesOnDay.length) return;
  selectedGame = gamesOnDay[0];
  renderModal();
}

function renderModal() {
  const g = selectedGame;
  const weekday = DAY_NAMES[g.date.getDay()];
  const teamColor = getTeamColor(g.opponent);

  // Format time properly
  let timeDisplay = 'TBD';
  if (g.time) {
    if (g.time.includes('T')) {
      const timePart = g.time.split('T')[1];
      if (timePart) {
        const [hours, minutes] = timePart.split(':');
        const hour = parseInt(hours);
        const ampm = hour >= 12 ? 'PM' : 'AM';
        const displayHour = hour % 12 || 12;
        timeDisplay = `${displayHour}:${minutes} ${ampm}`;
      }
    } else {
      timeDisplay = g.time;
    }
  }

  document.getElementById('modalTitle2').innerHTML = `<span class="phillies">Phillies</span> vs <span class="opponent" style="color:${teamColor}">${g.opponent}</span>`;

  document.getElementById('modalBody2').innerHTML = `
    <div class="modal-row">
      <span class="modal-label">Date</span>
      <span class="modal-value">${g.dateStr}</span>
    </div>
    <div class="modal-row">
      <span class="modal-label">Day</span>
      <span class="modal-value">${weekday}</span>
    </div>
    <div class="modal-row">
      <span class="modal-label">Time</span>
      <span class="modal-value">${timeDisplay}</span>
    </div>
    <div class="modal-row">
      <span class="modal-label">Seats</span>
      <span class="modal-value"><a href="https://venues.3ddigitalvenue.com/philadelphia-phillies?view_id=U18xMjQtMjktOQ==" target="_blank">Section 124, Row 29, Seats 9 & 10</a></span>
    </div>
    <div class="modal-row">
      <span class="modal-label">View</span>
      <div class="video-container">
        <iframe width="100%" height="220" src="https://www.youtube-nocookie.com/embed/aP2P2UyLrAE" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
    </div>
  `;

  document.getElementById('modalOverlay2').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modalOverlay2').style.display = 'none';
  selectedGame = null;
}

function addToCart() {
  if (!selectedGame) return;
  const exists = cart.find(g => g.dateStr === selectedGame.dateStr && g.opponent === selectedGame.opponent);
  if (!exists) {
    // Format time before adding to cart
    let formattedTime = 'TBD';
    if (selectedGame.time) {
      if (selectedGame.time.includes('T')) {
        const timePart = selectedGame.time.split('T')[1];
        if (timePart) {
          const [hours, minutes] = timePart.split(':');
          const hour = parseInt(hours);
          const ampm = hour >= 12 ? 'PM' : 'AM';
          const displayHour = hour % 12 || 12;
          formattedTime = `${displayHour}:${minutes} ${ampm}`;
        }
      } else {
        formattedTime = selectedGame.time;
      }
    }

    const gameToAdd = {
      ...selectedGame,
      time: formattedTime
    };
    cart.push(gameToAdd);
    updateCartCount();
    closeModal();
    alert('Game added to cart!');
  } else {
    alert('This game is already in your cart!');
  }
}

function updateCartCount() {
  document.getElementById('cartCount').textContent = cart.length;
}

function showCart() {
  if (cart.length === 0) {
    alert('Your cart is empty!');
    return;
  }
  renderCart();
  document.getElementById('cartOverlay').classList.add('active');
}

function closeCart() {
  document.getElementById('cartOverlay').classList.remove('active');
}

function renderCart() {
  let html = '';
  cart.forEach((g, idx) => {
    html += `<div style="padding:12px; background:#f8fafc; border-radius:8px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
      <div>
        <div style="font-weight:700;">${g.opponent}</div>
        <div style="font-size:0.85rem; color:#64748b;">${g.dateStr} at ${g.time}</div>
      </div>
      <button onclick="removeFromCart(${idx})" style="background:#e2e8f0; border:none; border-radius:6px; padding:6px 12px; cursor:pointer; font-weight:600;">Remove</button>
    </div>`;
  });
  document.getElementById('cartItems').innerHTML = html;
}

function removeFromCart(idx) {
  cart.splice(idx, 1);
  updateCartCount();
  renderCart();
}

function generatePurchaseOrder() {
  // Calculate canvas height based on number of games
  const gameHeight = 80;
  const minHeight = 600;
  const canvasHeight = Math.max(minHeight, 200 + (cart.length * gameHeight));

  const canvas = document.createElement('canvas');
  canvas.width = 800;
  canvas.height = canvasHeight;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, 800, canvasHeight);

  // Header
  ctx.fillStyle = '#002D72';
  ctx.fillRect(0, 0, 800, 100);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 48px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('PHILLIES TICKETS', 400, 70);

  // Title
  ctx.fillStyle = '#1e293b';
  ctx.font = 'bold 24px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('Game List', 40, 150);

  // Games
  let yPos = 200;
  ctx.font = '16px Arial';
  ctx.textAlign = 'left';

  cart.forEach((g, idx) => {
    ctx.fillStyle = '#1e293b';
    ctx.fillText(`${idx + 1}. Phillies vs ${g.opponent}`, 40, yPos);
    ctx.fillStyle = '#64748b';
    ctx.font = '14px Arial';
    ctx.fillText(`   ${g.dateStr} at ${g.time}`, 60, yPos + 25);
    ctx.fillText(`   Section 124, Row 29, Seats 9 & 10`, 60, yPos + 45);
    ctx.font = '16px Arial';
    yPos += 80;
  });

  // Footer
  ctx.fillStyle = '#64748b';
  ctx.font = '12px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('Send this image to the seller to complete your purchase', 400, canvasHeight - 30);

  // Convert to image and download
  const link = document.createElement('a');
  link.href = canvas.toDataURL('image/png');
  link.download = 'Game List.png';
  link.click();

  alert('Purchase order saved! You can now send this image to the seller.');
}
